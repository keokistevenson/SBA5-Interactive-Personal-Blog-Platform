<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <title>Midnight Blog</title>
</head>

<body>
    <header>
        <h1>Midnight Blog</h1>
    </header>
    <main>
        <section class="post-form-section">
            <form id="post-form">

                <header class="form-header">
                    <h2 id="blog-mode">Create Post</h2>
                </header>

                <label for="title">Title</label>
                <input id="title" name="title" type="text" placeholder="Post Title" minlength="2" maxlength="153"
                    required>
                <span id="title-error" aria-live="polite"></span>

                <label for="content">Content</label>
                <textarea id="content" name="content" placeholder="I can't post less than 10 characters so get with it!"
                    minlength="10" maxlength="5200" required></textarea>
                <span id="character-count" aria-live="polite">Characters Left: 5200 </span>
                <span id="content-error" aria-live="polite"></span>

                <footer>
                    <button id="save" type="submit">Save</button>
                    <button id="cancel" type="button">Cancel</button>
                </footer>

            </form>
        </section>

        <!-- DYNAMIC CONTENT: BLOG POSTS -->
        <section class="posts">
            <h2>Posts</h2>
            <span id="no-posts" hidden>No posts available.</span>

            <!-- THIS is where posts will display -->
            <div id="posts-list"></div>



            <!-- Template is best alternative to putting hidden in article. This is automatically hidden.-->
            <template id="post-template">
                <article class="post">
                    <header>
                        <h3 class="post-title"></h3>
                        <p class="timestamp">
                            <time class="post-time" datetime=""></time>
                        </p>
                    </header>

                    <div class="content">
                        <p class="post-content"></p>
                    </div>

                    <footer>
                        <button class="edit-btn" type="button">Edit</button>
                        <button class="delete-btn" type="button">Delete</button>
                    </footer>
                </article>
            </template>
        </section>
    </main>
    <footer>
        <p>Copyright &copy; 2026</p>
    </footer>
</body>

</html>
