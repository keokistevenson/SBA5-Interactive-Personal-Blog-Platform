<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>>
    <title>Interactive Personal Blog Platform</title>
</head>

<body>
    <header>
        <h1>Blog</h1>
    </header>
    <main>
        <section class="post-form-section">
            <form id="post-form">

                <h2 id="blog-mode">Page Function</h2>

                <label for="title">Title</label>
                <input id="title" name="title" type="text" placeholder="Post Title" minlength="2" required>
                <span id="title-error" aria-live="polite"></span>

                <label for="content">Content</label>
                <textarea id="content" name="content" laceholder="I can't post less than 10 characters so get with it!" minlength="10" maxlength="5200" required></textarea>
                <span id="character-count" aria-live="polite">Characters Left: 5200 </span>
                <span id="content-error" aria-live="polite"></span>

                <button id="Save" type="submit">Save </button>
                <button id="Cancel" type="button">Cancel</button>

            </form>
        </section>

        <section class="posts">
            <h2>Posts</h2>
            <span class="no-posts" hidden>No posts available.</span>

            <article class="post-template" hidden>
                <header>
                    <h3 id="post-title">Post Title</h3>
                    <p class="timestamp">
                        <time datetime="2026-03-29">March 29, 2026</time> <!--No sure how this works-->
                    </p>
                </header>

                <div class="content">
                    <p>Put stuff here.</p>
                </div>

                <footer>
                    <button id="edit" type="button">Edit</button>
                    <button id="delete" type="button">Delete</button>
                </footer>
            </article>

        </section>
    </main>
    <footer>Copyright © 2026</footer>
</body>

</html>
